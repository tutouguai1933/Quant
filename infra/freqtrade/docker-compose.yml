services:
  freqtrade:
    image: ${QUANT_FREQTRADE_IMAGE:-freqtradeorg/freqtrade:stable}
    container_name: ${QUANT_FREQTRADE_CONTAINER_NAME:-quant-freqtrade}
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./user_data:/freqtrade/user_data
    env_file:
      - .env
    environment:
      HTTP_PROXY: ${QUANT_PROXY_HTTP:-}
      HTTPS_PROXY: ${QUANT_PROXY_HTTP:-}
      ALL_PROXY: ${QUANT_PROXY_SOCKS:-}
      NO_PROXY: ${NO_PROXY:-127.0.0.1,localhost,freqtrade,mihomo}
      # Strategy configuration (passed from api.env)
      QUANT_STRATEGY_MIN_ENTRY_SCORE: ${QUANT_STRATEGY_MIN_ENTRY_SCORE:-0.60}
      QUANT_STRATEGY_TRAILING_STOP_TRIGGER: ${QUANT_STRATEGY_TRAILING_STOP_TRIGGER:-0.02}
      QUANT_STRATEGY_TRAILING_STOP_DISTANCE: ${QUANT_STRATEGY_TRAILING_STOP_DISTANCE:-0.01}
      QUANT_STRATEGY_PROFIT_EXIT_RATIO: ${QUANT_STRATEGY_PROFIT_EXIT_RATIO:-0.05}
      QUANT_STRATEGY_MAX_HOLDING_HOURS: ${QUANT_STRATEGY_MAX_HOLDING_HOURS:-48}
      QUANT_RSI_PERIOD: ${QUANT_RSI_PERIOD:-14}
      QUANT_RSI_OVERBUY_THRESHOLD: ${QUANT_RSI_OVERBUY_THRESHOLD:-70}
      QUANT_RSI_OVERSELL_THRESHOLD: ${QUANT_RSI_OVERSELL_THRESHOLD:-30}
      QUANT_MACD_FAST_PERIOD: ${QUANT_MACD_FAST_PERIOD:-12}
      QUANT_MACD_SLOW_PERIOD: ${QUANT_MACD_SLOW_PERIOD:-26}
      QUANT_MACD_SIGNAL_PERIOD: ${QUANT_MACD_SIGNAL_PERIOD:-9}
      QUANT_EMA_FAST_PERIOD: ${QUANT_EMA_FAST_PERIOD:-20}
      QUANT_EMA_SLOW_PERIOD: ${QUANT_EMA_SLOW_PERIOD:-55}
      QUANT_VOLUME_TREND_PERIOD: ${QUANT_VOLUME_TREND_PERIOD:-20}
      QUANT_API_BASE_URL: ${QUANT_API_BASE_URL:-http://127.0.0.1:9011}
      QUANT_RESEARCH_API_TIMEOUT: ${QUANT_RESEARCH_API_TIMEOUT:-5}
    command: >
      trade
      --config /freqtrade/user_data/${QUANT_FREQTRADE_PUBLIC_CONFIG:-config.base.json}
      --config /freqtrade/user_data/${QUANT_FREQTRADE_PRIVATE_CONFIG:-config.private.json}
      --config /freqtrade/user_data/${QUANT_FREQTRADE_PROXY_CONFIG:-config.proxy.noop.json}
      --strategy ${QUANT_FREQTRADE_STRATEGY:-SampleStrategy}
