services:
  mihomo:
    image: ${QUANT_MIHOMO_IMAGE:-metacubex/mihomo:latest}
    container_name: ${QUANT_MIHOMO_CONTAINER_NAME:-quant-mihomo}
    restart: unless-stopped
    network_mode: host
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    volumes:
      - ../mihomo:/root/.config/mihomo
    command:
      - -d
      - /root/.config/mihomo
      - -f
      - /root/.config/mihomo/config.yaml
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  openclaw:
    build:
      context: ../../services/openclaw
      dockerfile: Dockerfile
    container_name: ${QUANT_OPENCLAW_CONTAINER_NAME:-quant-openclaw}
    restart: unless-stopped
    network_mode: host
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      QUANT_API_BASE_URL: http://127.0.0.1:9011/api/v1
      HEALTH_CHECK_INTERVAL: ${QUANT_OPENCLAW_HEALTH_INTERVAL:-60}
      STATE_SYNC_INTERVAL: ${QUANT_OPENCLAW_SYNC_INTERVAL:-300}
      CYCLE_CHECK_INTERVAL: ${QUANT_OPENCLAW_CYCLE_INTERVAL:-900}
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "python", "-c", "print('healthy')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  api:
    build:
      context: ../..
      dockerfile: services/api/Dockerfile
    container_name: ${QUANT_API_CONTAINER_NAME:-quant-api}
    restart: unless-stopped
    network_mode: host
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      HTTP_PROXY: http://127.0.0.1:7890
      HTTPS_PROXY: http://127.0.0.1:7890
      NO_PROXY: 127.0.0.1,localhost,api,web,freqtrade,mihomo
      QUANT_PATROL_AUTO_START: "false"
    env_file:
      - ${QUANT_API_ENV_FILE:-./api.env}
    depends_on:
      - mihomo
      - freqtrade
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9011/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: ${QUANT_WEB_CONTAINER_NAME:-quant-web}
    restart: unless-stopped
    network_mode: host
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      QUANT_API_BASE_URL: http://127.0.0.1:9011/api/v1
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9012/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  freqtrade:
    image: ${QUANT_FREQTRADE_IMAGE:-freqtradeorg/freqtrade:stable}
    container_name: ${QUANT_FREQTRADE_CONTAINER_NAME:-quant-freqtrade}
    restart: unless-stopped
    network_mode: host
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      HTTP_PROXY: http://127.0.0.1:7890
      HTTPS_PROXY: http://127.0.0.1:7890
      NO_PROXY: 127.0.0.1,localhost,api,web,freqtrade,mihomo
    env_file:
      - ${QUANT_FREQTRADE_ENV_FILE:-../freqtrade/.env}
    volumes:
      - ../freqtrade/user_data:/freqtrade/user_data
    depends_on:
      - mihomo
    command: >
      trade
      --config /freqtrade/user_data/${QUANT_FREQTRADE_PUBLIC_CONFIG:-config.base.json}
      --config /freqtrade/user_data/${QUANT_FREQTRADE_DEPLOY_CONFIG:-config.deploy.json}
      --config /freqtrade/user_data/${QUANT_FREQTRADE_PRIVATE_CONFIG:-config.private.json}
      --config /freqtrade/user_data/${QUANT_FREQTRADE_PROXY_CONFIG:-config.proxy.mihomo.json}
      --strategy ${QUANT_FREQTRADE_STRATEGY:-SampleStrategy}
    healthcheck:
      test: ["CMD", "curl", "-f", "-u", "freqtrader:freqtrade123", "http://localhost:8080/api/v1/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Monitoring Stack
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: ${QUANT_PROMETHEUS_CONTAINER_NAME:-quant-prometheus}
    restart: unless-stopped
    network_mode: host
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  grafana:
    image: grafana/grafana:10.2.0
    container_name: ${QUANT_GRAFANA_CONTAINER_NAME:-quant-grafana}
    restart: unless-stopped
    network_mode: host
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${QUANT_GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${QUANT_GRAFANA_ADMIN_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3000"
      GF_INSTALL_PLUGINS: "grafana-clock-panel,grafana-piechart-panel"
      GF_ALERTING_ENABLED: "true"
      GF_UNIFIED_ALERTING_ENABLED: "true"
      GF_FEATURE_TOGGLES_ENABLE: "ngalert"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - prometheus

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: ${QUANT_CADVISOR_CONTAINER_NAME:-quant-cadvisor}
    restart: unless-stopped
    network_mode: host
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /cgroup:/cgroup:ro
    command:
      - '--port=8080'
      - '--docker_only=true'
      - '--enable_metrics=cpu,memory,filesystem,network,diskio'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  node-exporter:
    image: prom/node-exporter:v1.6.1
    container_name: ${QUANT_NODE_EXPORTER_CONTAINER_NAME:-quant-node-exporter}
    restart: unless-stopped
    network_mode: host
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--collector.netclass.ignored-devices=^(veth.*)$$'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9100/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  prometheus_data:
    name: quant_prometheus_data
  grafana_data:
    name: quant_grafana_data
