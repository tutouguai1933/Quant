services:
  mihomo:
    image: ${QUANT_MIHOMO_IMAGE:-metacubex/mihomo:latest}
    container_name: ${QUANT_MIHOMO_CONTAINER_NAME:-quant-mihomo}
    restart: unless-stopped
    network_mode: host
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    volumes:
      - ../mihomo:/root/.config/mihomo
    command:
      - -d
      - /root/.config/mihomo
      - -f
      - /root/.config/mihomo/config.yaml
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  openclaw:
    build:
      context: ../../services/openclaw
      dockerfile: Dockerfile
    container_name: ${QUANT_OPENCLAW_CONTAINER_NAME:-quant-openclaw}
    restart: unless-stopped
    network_mode: host
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      QUANT_API_BASE_URL: http://127.0.0.1:9011/api/v1
      HEALTH_CHECK_INTERVAL: ${QUANT_OPENCLAW_HEALTH_INTERVAL:-60}
      STATE_SYNC_INTERVAL: ${QUANT_OPENCLAW_SYNC_INTERVAL:-300}
      CYCLE_CHECK_INTERVAL: ${QUANT_OPENCLAW_CYCLE_INTERVAL:-900}
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "python", "-c", "print('healthy')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  api:
    build:
      context: ../..
      dockerfile: services/api/Dockerfile
    container_name: ${QUANT_API_CONTAINER_NAME:-quant-api}
    restart: unless-stopped
    network_mode: host
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      HTTP_PROXY: http://127.0.0.1:7890
      HTTPS_PROXY: http://127.0.0.1:7890
      NO_PROXY: 127.0.0.1,localhost,api,web,freqtrade,mihomo
      QUANT_PATROL_AUTO_START: "false"
    env_file:
      - ${QUANT_API_ENV_FILE:-./api.env}
    depends_on:
      - mihomo
      - freqtrade
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9011/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: ${QUANT_WEB_CONTAINER_NAME:-quant-web}
    restart: unless-stopped
    network_mode: host
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      QUANT_API_BASE_URL: http://127.0.0.1:9011/api/v1
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9012/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  freqtrade:
    image: ${QUANT_FREQTRADE_IMAGE:-freqtradeorg/freqtrade:stable}
    container_name: ${QUANT_FREQTRADE_CONTAINER_NAME:-quant-freqtrade}
    restart: unless-stopped
    network_mode: host
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      HTTP_PROXY: http://127.0.0.1:7890
      HTTPS_PROXY: http://127.0.0.1:7890
      NO_PROXY: 127.0.0.1,localhost,api,web,freqtrade,mihomo
    env_file:
      - ${QUANT_FREQTRADE_ENV_FILE:-../freqtrade/.env}
    volumes:
      - ../freqtrade/user_data:/freqtrade/user_data
    depends_on:
      - mihomo
    command: >
      trade
      --config /freqtrade/user_data/${QUANT_FREQTRADE_PUBLIC_CONFIG:-config.base.json}
      --config /freqtrade/user_data/${QUANT_FREQTRADE_DEPLOY_CONFIG:-config.deploy.json}
      --config /freqtrade/user_data/${QUANT_FREQTRADE_PRIVATE_CONFIG:-config.private.json}
      --config /freqtrade/user_data/${QUANT_FREQTRADE_PROXY_CONFIG:-config.proxy.mihomo.json}
      --strategy ${QUANT_FREQTRADE_STRATEGY:-SampleStrategy}
    healthcheck:
      test: ["CMD", "curl", "-f", "-u", "freqtrader:freqtrade123", "http://localhost:8080/api/v1/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
